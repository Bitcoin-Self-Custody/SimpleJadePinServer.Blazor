# Build and push multi-arch Docker image to GitHub Container Registry (ghcr.io).
# Builds for linux/amd64 and linux/arm64 (Raspberry Pi / Umbrel compatibility).
#
# Triggers:
#   - Push to main branch when src/ changes (publishes :latest)
#   - Tags matching v*.*.* (publishes versioned tags like :1.0.0)
#   - Manual dispatch via workflow_dispatch
#
# The image is published as:
#   ghcr.io/bitcoin-self-custody/simplejadepinserver.blazor

name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths: ["src/**", "Dockerfile"]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bitcoin-self-custody/simplejadepinserver.blazor

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables arm64 emulation on the amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx supports multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine tags:
      #   main push  → :latest + :sha
      #   v1.2.3 tag → :1.2.3 + :1.2 + :latest + :sha
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # Build for amd64 + arm64 and push to ghcr.io
      # Tests run inside the Dockerfile build stage
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
