# Build and push Docker image to GitHub Container Registry (ghcr.io)
# using .NET's native container support (dotnet publish /t:PublishContainer).
# No Dockerfile needed — the SDK builds the container image directly from the csproj.
#
# Triggers:
#   - Push to main branch (publishes :latest)
#   - Tags matching v*.*.* (publishes versioned tags like :1.0.0)
#   - Manual dispatch via workflow_dispatch
#
# The image is published as:
#   ghcr.io/bitcoin-self-custody/simplejadepinserver.blazor

name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Write packages permission is needed to push to ghcr.io
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bitcoin-self-custody/simplejadepinserver.blazor

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install .NET SDK — required for dotnet publish /t:PublishContainer
      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Authenticate to ghcr.io so dotnet publish can push the image
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Run tests before building the container image
      - name: Run tests
        run: dotnet test SimpleJadePinServer.Blazor.slnx -v m

      # Determine image tag names based on git ref.
      # ContainerImageTags expects just tag names (e.g., "latest;abc1234"), not full URLs.
      #   - Push to main → latest + short SHA
      #   - Tag v1.2.3   → 1.2.3 + latest + short SHA
      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAGS="latest;${SHORT_SHA}"

          # If this is a version tag (v1.2.3), also add the version number
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${VERSION};${TAGS}"
          fi

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      # Build and push using .NET's native container support.
      # The csproj has <EnableSdkContainerSupport>true</EnableSdkContainerSupport>
      # which enables the /t:PublishContainer target.
      - name: Publish container image to ghcr.io
        run: |
          dotnet publish src/SimpleJadePinServer.Blazor/SimpleJadePinServer.Blazor.csproj \
            -c Release \
            /t:PublishContainer \
            "-p:ContainerRegistry=${{ env.REGISTRY }}" \
            "-p:ContainerRepository=${{ env.IMAGE_NAME }}" \
            "-p:ContainerImageTags=${{ steps.tags.outputs.tags }}"
